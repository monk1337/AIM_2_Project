GENERAL:
  TOTAL_STEPS: 50000
  LOG_STEPS: 100
  VAL_STEPS: 500
  CHECKPOINT_STEPS: 2000
  CHECKPOINT_SAVE_TOP_K: 3
  NUM_WORKERS: 4

TRAIN:
  LR: 5.0e-06
  WEIGHT_DECAY: 0.0001
  BATCH_SIZE: 16
  GRAD_CLIP_VAL: 1.0

MODEL:
  IMAGE_SIZE: 256
  IMAGE_MEAN: [0.485, 0.456, 0.406]
  IMAGE_STD: [0.229, 0.224, 0.225]
  BACKBONE:
    TYPE: vit
  BBOX_SHAPE:
    - 192
    - 256
  MANO_HEAD:
    TYPE: transformer_decoder
    IN_CHANNELS: 2048

MANO:
  MODEL_PATH: ''
  DATA_DIR: ''
  GENDER: neutral
  NUM_HAND_JOINTS: 15
  MEAN_PARAMS: ''
  CREATE_BODY_POSE: false

EXTRA:
  FOCAL_LENGTH: 5000
  NUM_LOG_IMAGES: 4

LOSS_WEIGHTS:
  KEYPOINTS_3D: 0.05
  KEYPOINTS_2D: 0.01
  GLOBAL_ORIENT: 0.001
  HAND_POSE: 0.001
  BETAS: 0.0005
  ADVERSARIAL: 0.0
  VERTICES_3D: 0.0

DATASETS:
  CONFIG:
    SCALE_FACTOR: 0.3
    ROT_FACTOR: 30
    TRANS_FACTOR: 0.02
    COLOR_SCALE: 0.2
    ROT_AUG_RATE: 0.6
    DO_FLIP: false
